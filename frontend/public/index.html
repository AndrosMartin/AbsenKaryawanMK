<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>AbsensiPro — Sistem Absensi Karyawan</title>
  <meta name="description" content="Sistem absensi karyawan dengan verifikasi wajah, QR code, dan geofence GPS untuk monitoring kehadiran." />

  <!-- Tailwind Play CDN (native, dynamic) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ["'Cabinet Grotesk'", "sans-serif"],
            sans: ["'IBM Plex Sans'", "sans-serif"],
            mono: ["'JetBrains Mono'", "monospace"],
          },
          colors: {
            gold: {
              DEFAULT: "#E0B100", 50: "#FBF6E3", 100: "#F7ECC2", 200: "#F0D98A",
              300: "#E9C654", 400: "#E0B100", 500: "#C99A00", 600: "#A87E00",
              700: "#856300", 800: "#6B5000", 900: "#574200",
            },
            ink: { DEFAULT: "#0B0B0C", 700: "#222225", 800: "#161618", 900: "#0B0B0C" },
          },
        },
      },
    };
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,500,700,400&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Libraries: face recognition, QR scan, QR generate -->
  <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

  <style>
    html, body { font-family: 'IBM Plex Sans', sans-serif; background: #f8fafc; }
    h1,h2,h3,h4,.font-heading { font-family: 'Cabinet Grotesk', sans-serif; }
    ::selection { background: #E0B100; color: #0B0B0C; }
    /* scrollbar */
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-thumb { background: #d6c270; border-radius: 9px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .fade-in { animation: fadeIn .4s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: none;} }
    .stagger > * { animation: fadeIn .45s ease both; }
    .stagger > *:nth-child(1){animation-delay:.03s}
    .stagger > *:nth-child(2){animation-delay:.08s}
    .stagger > *:nth-child(3){animation-delay:.13s}
    .stagger > *:nth-child(4){animation-delay:.18s}
    .stagger > *:nth-child(5){animation-delay:.23s}
    .stagger > *:nth-child(6){animation-delay:.28s}
    /* gold active navigation on black sidebar */
    .nav-active { background: linear-gradient(90deg, rgba(224,177,0,.16), rgba(224,177,0,.04)); color:#F0D98A; box-shadow: inset 3px 0 0 #E0B100; }
    .nav-active .ph, .nav-active i { color:#E0B100; }
    .spin { animation: spin 1s linear infinite; } @keyframes spin { to { transform: rotate(360deg);} }
    #global-loader { transition: opacity .3s; }
    /* brand gradients */
    .bg-hero-dark { background: radial-gradient(120% 120% at 80% 0%, rgba(224,177,0,.18) 0%, rgba(224,177,0,0) 45%), linear-gradient(160deg,#0B0B0C 0%, #161618 60%, #0B0B0C 100%); }
    .text-gold-grad { background: linear-gradient(90deg,#E0B100,#F0D98A); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .notif-badge { animation: pop .25s ease; } @keyframes pop { from{ transform: scale(.4); opacity:0 } to{ transform: scale(1); opacity:1 } }
  </style>
</head>
<body class="antialiased text-slate-800">
  <div id="global-loader" class="fixed inset-0 z-[100] flex items-center justify-center bg-ink">
    <div class="flex flex-col items-center gap-3">
      <img src="/logo-mitra.jpg" alt="MitraKeuangan" class="h-16 w-16 rounded-xl object-cover ring-1 ring-gold/40" />
      <span class="text-xs uppercase tracking-widest text-gold/70 font-medium">Memuat AbsensiPro…</span>
    </div>
  </div>

  <div id="app"></div>
  <div id="toast-root" class="fixed top-4 right-4 z-[120] flex flex-col gap-2"></div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
